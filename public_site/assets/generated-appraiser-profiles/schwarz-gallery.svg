<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Schwarz Gallery profile artwork</title>
  <desc id="desc">Generated non-likeness directory artwork for Schwarz Gallery in Philadelphia, PA.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f1e9"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#324a5f" stroke-opacity=".055" stroke-width="2"/>
    </pattern>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#grid)"/>
  <circle cx="266" cy="200" r="126" fill="#8fb9aa" opacity=".18"/>
  <circle cx="960" cy="720" r="190" fill="#324a5f" opacity=".08"/>
  <path d="M118 610 C260 140, 420 820, 590 662 S918 518, 1088 226" fill="none" stroke="#8fb9aa" stroke-width="14" stroke-linecap="round" opacity=".55"/>
  <path d="M118 655 C280 484, 448 802, 620 705 S914 558, 1088 284" fill="none" stroke="#324a5f" stroke-width="4" stroke-linecap="round" opacity=".18"/>
  <g transform="translate(600 390)">
