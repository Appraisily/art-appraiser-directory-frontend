    <circle r="150" fill="#324a5f"/>
    <text x="0" y="54" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="150" font-weight="700" fill="#fff">SG</text>
  </g>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <text x="600" y="660" font-size="48" font-weight="700" fill="#324a5f">Schwarz Gallery</text>
    <text x="600" y="720" font-size="28" font-weight="600" fill="#324a5f" opacity=".72">Philadelphia, PA</text>
    <text x="600" y="768" font-size="22" font-weight="500" fill="#324a5f" opacity=".52">Generated directory artwork, not a likeness</text>
