  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#grid)"/>
  <circle cx="265" cy="199" r="126" fill="#e0a458" opacity=".18"/>
  <circle cx="961" cy="711" r="190" fill="#513b56" opacity=".08"/>
  <path d="M118 610 C260 109, 420 820, 590 662 S918 518, 1088 226" fill="none" stroke="#e0a458" stroke-width="14" stroke-linecap="round" opacity=".55"/>
